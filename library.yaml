# Soup — distributed skill/agent catalog (The Library pattern)
# Pull on demand via: just library-use <name>
# Source of truth lives in upstream repos; local copies are cached.
#
# NOTE: Templates under templates/ are discoverable by /soup-init directly
# (directory listing) and don't require a catalog entry here. Likewise,
# file-resolved rules under rules/<stack>/*.md are auto-injected by the
# pre_tool_use hook based on path/extension routing (see
# .claude/hooks/pre_tool_use.py). Compliance rules under
# rules/compliance/*.md are injected by the subagent_start hook based on
# the active intake form's `compliance_flags[]` (see
# rules/compliance/README.md and .claude/hooks/subagent_start.py). Global
# rules (rules/global/*.md) are always injected by subagent_start. Only
# skills and agents are cataloged here.

version: 1

catalog:
  # Skills — core procedural gates (superpowers-adapted)
  - name: brainstorming
    type: skill
    source: local:.claude/skills/brainstorming/SKILL.md
    upstream: https://github.com/obra/superpowers
    requires: []

  - name: tdd
    type: skill
    source: local:.claude/skills/tdd/SKILL.md
    upstream: https://github.com/obra/superpowers
    requires: []

  - name: systematic-debugging
