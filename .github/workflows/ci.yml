name: CI

# Constitution Art. VI.3 + Art. IX: commit-boundary enforcement. This
# workflow runs the same commands engineers run locally via
# ``just lint``, ``just typecheck``, ``just test`` so CI and local
# feedback never drift. A second job exercises ``soup plan-validate``
# against a real plan in ``.soup/plans/`` to catch schema regressions,
# and a third scans the staged diff for secrets using the same
# ``.githooks/pre-commit`` script shipped for local installs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Main CI job ──────────────────────────────────────────────────
  test:
    name: lint + typecheck + pytest
    runs-on: ubuntu-latest
    # Matrix reserved for v1.1: macos-latest + windows-latest.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint (ruff)
        run: just lint

      - name: Typecheck (mypy)
        run: just typecheck

      - name: Test (pytest)
        run: just test

  # ─── Plan-validate smoke job ──────────────────────────────────────
  # Runs the CLI plan-validate command against any ExecutionPlan JSON
  # shipped under ``.soup/plans/`` (if present) — catches schema drift
  # between the meta-prompter's output shape and the orchestrator's
  # consumer.
  plan-validate:
    name: soup plan-validate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Validate prompt-library plan (if present)
        run: |
          if [ -f .soup/plans/prompt-library.json ]; then
            python -m orchestrator.cli plan-validate .soup/plans/prompt-library.json
          else
            echo "::notice::no .soup/plans/prompt-library.json — skipping"
          fi

      - name: Validate every plan under .soup/plans/
        run: |
          shopt -s nullglob
          for f in .soup/plans/*.json; do
            echo "::group::$f"
            python -m orchestrator.cli plan-validate "$f"
            echo "::endgroup::"
          done

  # ─── Secret-scan job ─────────────────────────────────────────────
  # Runs the same pre-commit script every developer installs via
  # ``just install-hooks`` — simulates the commit by staging HEAD diff
  # so the diff-only scan finds high-entropy values and key prefixes.
  # This also exercises the hook itself, catching regressions in the
  # scanner before they ship.
  secret-scan:
    name: secret scan (.githooks/pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stage every tracked file as an "added" diff
        # The pre-commit script inspects ``git diff --cached``. For a
        # CI run we synthesise a "staged" diff by adding all tracked
        # files to the index so the scanner observes every line the
        # repo currently carries.
        run: |
          git config user.name "ci"
          git config user.email "ci@example.com"
          git reset --mixed
          git add -A

      - name: Run pre-commit scanner
        run: bash .githooks/pre-commit
