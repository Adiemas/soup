services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    # One-shot: run pending EF Core migrations before the API comes up. Exits 0
    # on success; docker compose treats this as "service_completed_successfully"
    # which the API then depends on.
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src
    volumes:
      - ./:/src
    environment:
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=app;Username=app;Password=app"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: ["dotnet tool restore && dotnet ef database update --project YourApi.csproj"]

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=app;Username=app;Password=app"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  pgdata:
